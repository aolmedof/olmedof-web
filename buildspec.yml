version: 0.2

# Environment variables injected by CodeBuild (defined in Terraform):
#   S3_BUCKET           — destination S3 bucket
#   CLOUDFRONT_DIST_ID  — CloudFront distribution to invalidate

phases:
  build:
    commands:
      - aws s3 sync . s3://$S3_BUCKET --delete --exclude ".git/*" --exclude "buildspec.yml" --exclude "README.md" --exclude ".gitignore"
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"

artifacts:
  files:
    - "**/*"
